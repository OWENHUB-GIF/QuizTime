<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizTime! ข้อสอบสนุก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FEFCF8;font-family:'Nunito',system-ui,sans-serif}
#qz{min-height:100vh;max-width:520px;margin:0 auto;padding:28px 18px 64px;position:relative;overflow:hidden}
.scr{animation:pop .3s ease both}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* LOGO & HOME */
.logo{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.logo-box{width:78px;height:78px;border-radius:22px;background:#FFF3DC;border:2.5px solid #FCD34D;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.app-title{font-size:30px;font-weight:900;color:#1E293B;letter-spacing:-1px;margin-bottom:4px}
.app-sub{font-size:14px;color:#64748B}
.section-label{font-size:11px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:13px;position:relative;z-index:1}

/* SUBJECT CARDS */
.cards{display:flex;flex-direction:column;gap:13px;position:relative;z-index:1}
.card-btn{display:flex;align-items:center;gap:15px;padding:17px 20px;border-radius:22px;border:2.5px solid transparent;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;width:100%;transition:transform .15s,border-color .15s}
.card-btn:hover{transform:scale(1.025)}.card-btn:active{transform:scale(.975)}
.sci-card{background:#DCFCE7;color:#14532D}.sci-card:hover{border-color:#16A34A}
.math-card{background:#EDE9FE;color:#4C1D95}.math-card:hover{border-color:#7C3AED}
.eng-card{background:#DBEAFE;color:#1E3A8A}.eng-card:hover{border-color:#2563EB}
.card-name{font-size:20px;font-weight:900;margin-bottom:2px}.card-hint{font-size:13px;opacity:.65}

/* GRADE */
.grade-header{text-align:center;margin-bottom:24px}
.grade-title{font-size:24px;font-weight:900;color:#1E293B;margin-bottom:5px}.grade-sub{font-size:14px;color:#64748B}
.mascot-center{text-align:center;margin-bottom:20px}
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.gbtn{border-radius:18px;border:2.5px solid #E2E8F0;background:white;padding:20px 10px;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;color:#1E293B;transition:transform .15s,background .15s,border-color .15s,color .15s;text-align:center}
.gbtn:hover{transform:scale(1.05)}.gbtn:active{transform:scale(.96)}
.g1:hover{background:#FEF3C7;border-color:#F59E0B;color:#92400E}
.g2:hover{background:#DCFCE7;border-color:#16A34A;color:#14532D}
.g3:hover{background:#EDE9FE;border-color:#7C3AED;color:#4C1D95}
.g4:hover{background:#DBEAFE;border-color:#2563EB;color:#1E3A8A}

/* SET SIZE TOGGLE */
.set-row{display:flex;gap:10px;margin-bottom:4px}
.sbtn{flex:1;border-radius:14px;border:2px solid #E2E8F0;background:white;padding:11px 6px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;color:#64748B;transition:all .15s}
.sbtn.active,.sbtn:hover{background:#F1F5F9;border-color:#94A3B8;color:#1E293B}

.back{background:none;border:none;font-family:'Nunito',sans-serif;color:#94A3B8;font-size:14px;font-weight:700;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px;margin-bottom:16px}
.back:hover{color:#475569}

/* QUIZ */
.qz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.qz-label{font-size:12px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:.6px}
.qz-score{background:#F1F5F9;border-radius:99px;padding:5px 15px;font-size:13px;font-weight:900;color:#1E293B}
.prog{height:9px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-bottom:20px}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
.sci-fill{background:#16A34A}.math-fill{background:#7C3AED}.eng-fill{background:#2563EB}

.qcard{background:white;border:1.5px solid #E2E8F0;border-radius:22px;padding:22px;margin-bottom:14px}
.qnum{font-size:11px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px}
.qtext{font-size:18px;font-weight:800;color:#1E293B;line-height:1.55}

.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:13px}
.opt{display:flex;align-items:center;gap:12px;border-radius:16px;border:2px solid #E2E8F0;background:white;padding:13px 15px;font-size:15px;font-weight:600;color:#1E293B;font-family:'Nunito',sans-serif;cursor:pointer;text-align:left;width:100%;transition:transform .12s,border-color .12s,background .12s}
.opt:not(.done):hover{border-color:#94A3B8;transform:scale(1.01)}.opt:not(.done):active{transform:scale(.98)}
.opt.done{cursor:default}
.opt.correct{background:#DCFCE7;border-color:#16A34A;color:#14532D}
.opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#7F1D1D}
.olabel{width:31px;height:31px;border-radius:50%;background:#F1F5F9;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#64748B}
.opt.correct .olabel{background:#16A34A;color:white}.opt.wrong .olabel{background:#DC2626;color:white}

.fb{border-radius:14px;padding:12px 16px;font-size:14px;font-weight:700;margin-bottom:12px;display:none}
.fb.show{display:block}.fb.ok{background:#DCFCE7;color:#14532D}.fb.no{background:#FEE2E2;color:#7F1D1D}

.nxt{width:100%;border-radius:16px;border:none;padding:16px;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;color:white;transition:transform .12s;display:none}
.nxt.show{display:block}.nxt:hover{transform:scale(1.02)}.nxt:active{transform:scale(.978)}
.sci-nxt{background:#16A34A}.math-nxt{background:#7C3AED}.eng-nxt{background:#2563EB}

/* RESULT */
.res{text-align:center;padding:8px 0}
.score-ring{width:130px;height:130px;border-radius:50%;background:#F8FAFC;border:3px solid #E2E8F0;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:14px auto 20px}
.score-n{font-size:42px;font-weight:900;color:#1E293B;line-height:1}
.score-of{font-size:13px;color:#64748B;font-weight:700}
.stars{display:flex;justify-content:center;gap:7px;margin-bottom:20px}
.res-title{font-size:25px;font-weight:900;color:#1E293B;margin-bottom:7px}
.res-msg{font-size:14px;color:#64748B;margin-bottom:28px;line-height:1.6}
.res-btns{display:flex;flex-direction:column;gap:10px}
.btn-p{border-radius:16px;border:none;padding:16px;font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;color:white;transition:transform .12s}
.btn-p:hover{transform:scale(1.02)}
.btn-s{border-radius:16px;border:2px solid #E2E8F0;background:white;padding:13px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;color:#475569;transition:transform .12s,background .12s}
.btn-s:hover{background:#F8FAFC;transform:scale(1.01)}

/* BADGE */
.badge{display:inline-block;background:#F1F5F9;border-radius:99px;padding:4px 14px;font-size:12px;font-weight:700;color:#64748B;margin-bottom:16px}

/* ANIM */
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.bnc{animation:bounce 2.2s ease-in-out infinite}
.bnc2{animation:bounce 2.2s ease-in-out infinite;animation-delay:.4s}
.bnc3{animation:bounce 2.2s ease-in-out infinite;animation-delay:.8s}
.dc{position:absolute;border-radius:50%;pointer-events:none;z-index:0}

/* GUIDE SCREEN */
.guide-subj-tabs{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.gtab{flex-shrink:0;border-radius:99px;border:2px solid #E2E8F0;background:white;padding:8px 16px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;color:#64748B;transition:all .15s}
.gtab.active-sci{background:#DCFCE7;border-color:#16A34A;color:#14532D}
.gtab.active-math{background:#EDE9FE;border-color:#7C3AED;color:#4C1D95}
.gtab.active-eng{background:#DBEAFE;border-color:#2563EB;color:#1E3A8A}

.topic-card{background:white;border:1.5px solid #E2E8F0;border-radius:18px;margin-bottom:13px;overflow:hidden}
.topic-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.topic-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.topic-title{font-size:15px;font-weight:900;color:#1E293B;flex:1}
.topic-chevron{color:#94A3B8;font-size:12px;transition:transform .2s}
.topic-chevron.open{transform:rotate(180deg)}
.topic-body{display:none;padding:0 16px 16px;border-top:1.5px solid #F1F5F9}
.topic-body.open{display:block}

.formula-box{background:#F8FAFC;border-radius:12px;padding:12px 14px;margin-bottom:10px;border-left:3px solid #CBD5E1}
.formula-box.sci{border-left-color:#16A34A;background:#F0FDF4}
.formula-box.math{border-left-color:#7C3AED;background:#F5F3FF}
.formula-box.eng{border-left-color:#2563EB;background:#EFF6FF}
.formula-title{font-size:12px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.formula-main{font-size:17px;font-weight:900;color:#1E293B;margin-bottom:6px;font-family:monospace}
.formula-desc{font-size:13px;color:#475569;line-height:1.65}
.formula-ex{margin-top:8px;background:white;border-radius:8px;padding:8px 10px;font-size:13px;color:#1E293B;border:1px solid #E2E8F0}
.ex-label{font-size:11px;font-weight:800;color:#94A3B8;margin-bottom:3px}
.ex-q{color:#374151;font-weight:700;margin-bottom:4px}
.ex-a{color:#16A34A;font-weight:800}
.ex-a.math{color:#7C3AED}
.ex-a.eng{color:#2563EB}

.tip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tip-pill{border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700}
.tip-green{background:#DCFCE7;color:#14532D}
.tip-purple{background:#EDE9FE;color:#4C1D95}
.tip-blue{background:#DBEAFE;color:#1E3A8A}
.tip-amber{background:#FEF3C7;color:#92400E}
.tip-red{background:#FEE2E2;color:#7F1D1D}

.eng-table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
.eng-table th{background:#EFF6FF;color:#1E3A8A;font-weight:800;padding:8px 10px;text-align:left;border:1px solid #BFDBFE}
.eng-table td{padding:7px 10px;border:1px solid #E2E8F0;color:#374151;font-weight:600}
.eng-table tr:nth-child(even) td{background:#F8FAFC}
.eng-table .hl{color:#2563EB;font-weight:900}

/* GUIDE BTN on home */
.guide-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#64748B;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;padding:4px 0;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.guide-link:hover{color:#1E293B}

/* RANDOM INDICATOR */
.rand-badge{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:1.5px solid #86EFAC;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;color:#166534;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* HOME BUTTON in quiz */
.quiz-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.home-btn{background:none;border:1.5px solid #E2E8F0;border-radius:12px;padding:7px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#64748B;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s,color .15s,border-color .15s}
.home-btn:hover{background:#FEF2F2;border-color:#FECACA;color:#DC2626}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:white;border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-icon{font-size:44px;margin-bottom:12px}
.modal-title{font-size:19px;font-weight:900;color:#1E293B;margin-bottom:8px}
.modal-msg{font-size:14px;color:#64748B;margin-bottom:22px;line-height:1.6}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;border-radius:14px;border:2px solid #E2E8F0;background:white;padding:13px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;color:#475569;transition:background .12s}
.modal-cancel:hover{background:#F8FAFC}
.modal-confirm{flex:1;border-radius:14px;border:none;background:#EF4444;padding:13px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;color:white;transition:transform .12s}
.modal-confirm:hover{transform:scale(1.03)}

/* PLAYER FORM */
.player-card{background:white;border:1.5px solid #E2E8F0;border-radius:18px;padding:16px 16px 14px;margin-bottom:16px}
.player-label{font-size:12px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.player-input{width:100%;border-radius:14px;border:2px solid #E2E8F0;background:#fff;padding:14px 15px;font-size:16px;font-weight:700;font-family:'Nunito',sans-serif;color:#1E293B;outline:none;transition:border-color .15s, box-shadow .15s}
.player-input:focus{border-color:#94A3B8;box-shadow:0 0 0 4px rgba(148,163,184,.15)}
.player-help{font-size:12px;line-height:1.6;color:#64748B;margin-top:8px}
.player-warn{margin-top:10px;background:#FFF7ED;border:1px solid #FED7AA;color:#9A3412;border-radius:12px;padding:10px 12px;font-size:12px;font-weight:700;display:none}
.player-warn.show{display:block}
.status-note{font-size:12px;color:#64748B;margin-top:10px}

</style>
</head>
<body>
<div id="qz"></div>
<script>
/* ── MASCOT SVG ── */
const MSK={
science:`<circle cx="40" cy="50" r="27" fill="#FECDD3"/>
<polygon points="16,29 7,6 31,23" fill="#FECDD3"/><polygon points="64,29 73,6 49,23" fill="#FECDD3"/>
<polygon points="17,27 11,10 29,21" fill="#FDA4AF"/><polygon points="63,27 69,10 51,21" fill="#FDA4AF"/>
<circle cx="30" cy="50" r="11" fill="white" stroke="#374151" stroke-width="2.2"/>
<circle cx="50" cy="50" r="11" fill="white" stroke="#374151" stroke-width="2.2"/>
<line x1="39" y1="50" x2="41" y2="50" stroke="#374151" stroke-width="2.5"/>
<line x1="19" y1="48" x2="14" y2="46" stroke="#374151" stroke-width="2"/>
<line x1="61" y1="48" x2="66" y2="46" stroke="#374151" stroke-width="2"/>
<circle cx="30" cy="51" r="6" fill="#1F2937"/><circle cx="50" cy="51" r="6" fill="#1F2937"/>
<circle cx="32" cy="49" r="2.2" fill="white"/><circle cx="52" cy="49" r="2.2" fill="white"/>
<ellipse cx="40" cy="60" rx="3.5" ry="2.5" fill="#FB7185"/>
<path d="M33 65 Q40 72 47 65" fill="none" stroke="#FB7185" stroke-width="2.2" stroke-linecap="round"/>
<line x1="7" y1="54" x2="21" y2="57" stroke="#CBD5E1" stroke-width="1.6"/>
<line x1="7" y1="61" x2="21" y2="61" stroke="#CBD5E1" stroke-width="1.6"/>
<line x1="73" y1="54" x2="59" y2="57" stroke="#CBD5E1" stroke-width="1.6"/>
<line x1="73" y1="61" x2="59" y2="61" stroke="#CBD5E1" stroke-width="1.6"/>`,

<circle cx="31" cy="51" r="5.5" fill="#1F2937"/><circle cx="49" cy="51" r="5.5" fill="#1F2937"/>
<circle cx="33" cy="49" r="2.2" fill="white"/><circle cx="51" cy="49" r="2.2" fill="white"/>
<ellipse cx="40" cy="60" rx="3.5" ry="2.5" fill="#F472B6"/>
<path d="M33 65 Q40 72 47 65" fill="none" stroke="#F472B6" stroke-width="2.2" stroke-linecap="round"/>
<ellipse cx="40" cy="75" rx="8" ry="5" fill="#C4B5FD"/>`,
english:`<ellipse cx="40" cy="65" rx="23" ry="17" fill="#FDE68A"/>
<circle cx="40" cy="40" r="25" fill="#FCD34D"/>
<polygon points="26,21 18,3 37,18" fill="#FCD34D"/><polygon points="54,21 62,3 43,18" fill="#FCD34D"/>
<circle cx="29" cy="40" r="13" fill="white" stroke="#92400E" stroke-width="2.2"/>
<circle cx="51" cy="40" r="13" fill="white" stroke="#92400E" stroke-width="2.2"/>
<circle cx="29" cy="41" r="7" fill="#1F2937"/><circle cx="51" cy="41" r="7" fill="#1F2937"/>
<circle cx="32" cy="38" r="2.5" fill="white"/><circle cx="54" cy="38" r="2.5" fill="white"/>
<polygon points="40,51 34,59 46,59" fill="#F59E0B"/>
<line x1="21" y1="30" x2="37" y2="33" stroke="#92400E" stroke-width="2.8" stroke-linecap="round"/>
<line x1="59" y1="30" x2="43" y2="33" stroke="#92400E" stroke-width="2.8" stroke-linecap="round"/>`};
function msvg(s,w){return`<svg width="${w}" height="${w}" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">${MSK[s]}</svg>`}
function starSVG(on){const f=on?'#FBBF24':'#E5E7EB',k=on?'#F59E0B':'#D1D5DB';return`<svg width="44" height="44" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${f}" stroke="${k}" stroke-width="1" stroke-linejoin="round"/></svg>`}

/* ════════════════════════════════════════════════════════
   QUESTION BANK  –  60 questions × 3 subjects × 4 grades
   ════════════════════════════════════════════════════════ */
const QB={
science:{
1:[
{q:"หน่วยพื้นฐานของสิ่งมีชีวิตทุกชนิดคืออะไร?",o:["เซลล์","ดีเอ็นเอ","โปรตีน","เอนไซม์"],a:0},
{q:"น้ำบริสุทธิ์มีสูตรเคมีว่าอย่างไร?",o:["H₂O","CO₂","O₂","NaCl"],a:0},
{q:"ดาวฤกษ์ที่อยู่ใกล้โลกที่สุดคืออะไร?",o:["ดวงอาทิตย์","ดาวพุธ","ดาวศุกร์","ดาวอังคาร"],a:0},
{q:"สัตว์ชนิดใดที่เป็นสัตว์เลือดอุ่น?",o:["นก","ปลา","กบ","งู"],a:0},
{q:"พืชใช้แก๊สใดในการสังเคราะห์แสง?",o:["CO₂","O₂","N₂","H₂"],a:0},
{q:"สารใดเป็นองค์ประกอบของน้ำ?",o:["ไฮโดรเจนและออกซิเจน","คาร์บอนและออกซิเจน","ไนโตรเจนและออกซิเจน","ไฮโดรเจนและคาร์บอน"],a:0},
{q:"กระดูกสันหลังมีจำนวนกี่ชิ้นในมนุษย์ผู้ใหญ่?",o:["26 ชิ้น","24 ชิ้น","30 ชิ้น","33 ชิ้น"],a:0},
{q:"แสงอาทิตย์ใช้เวลากี่นาทีถึงโลก?",o:["8 นาที","1 นาที","30 นาที","60 นาที"],a:0},

/* ── UTILS ── */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':'&quot;',"'":'&#39;'}[m]));}
function getDeviceId(){
  let id=localStorage.getItem('qt_device_id');
  if(!id){
    id='dev_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);
    localStorage.setItem('qt_device_id',id);
  }
  return id;
}
function newAttemptId(){return 'att_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);}
function saveLocalResult(payload){
  const rows=JSON.parse(localStorage.getItem('qt_score_log')||'[]');
  rows.push(payload);
  localStorage.setItem('qt_score_log',JSON.stringify(rows));
}
async function sendScoreToSheet(){
  if(st.saveStatus==='saving'||st.saveStatus==='saved')return;
  const payload={
    attemptId:st.attemptId,
    nickname:st.nickname.trim(),
    subjectKey:st.subj,
    subjectName:SC[st.subj]?.name||st.subj,
    grade:st.grade,
    totalQuestions:st.qs.length,
    score:st.score,
    wrong:st.qs.length-st.score,
    percent:st.qs.length?Math.round((st.score/st.qs.length)*100):0,
    playedAt:new Date().toISOString(),
    userAgent:navigator.userAgent,
    deviceId:getDeviceId()
  };
  saveLocalResult(payload);
  if(!SHEET_WEB_APP_URL || SHEET_WEB_APP_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE')){
    st.saveStatus='local-only';
    return;
  }
  try{
    st.saveStatus='saving';
    await fetch(SHEET_WEB_APP_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)
    });
    st.saveStatus='saved';
  }catch(err){
    console.error('save score failed',err);
    st.saveStatus='error';
  }
}

function prepQ(s,g,n){
  const pool=QB[s][g];
  const picked=shuffle(pool).slice(0,n);
  return picked.map(q=>{
    const o=[...q.o],cor=o[q.a];
    const so=shuffle(o);
    return{q:q.q,o:so,a:so.indexOf(cor)};
  });
}

    {t:'กฎของโอห์ม',f:'V = I × R\nV = แรงดันไฟฟ้า (โวลต์, V)\nI = กระแสไฟฟ้า (แอมแปร์, A)\nR = ความต้านทาน (โอห์ม, Ω)',d:'วิธีจำ: VIR triangle\nหา V: V = IR | หา I: I = V/R | หา R: R = V/I',ex:{q:'วงจรมีแรงดัน 12V ความต้านทาน 4Ω กระแส = ?',a:'I = V/R = 12/4 = 3 A'}},
    {t:'วงจรอนุกรม vs ขนาน',f:'อนุกรม: R_total = R₁ + R₂ + R₃ | กระแส I เท่ากันทุกตัว\nขนาน: 1/R_total = 1/R₁ + 1/R₂ | แรงดัน V เท่ากันทุกตัว',d:'อนุกรม: หลอดดับหลอดเดียว ทั้งหมดดับ\nขนาน: หลอดดับหลอดเดียว ที่เหลือยังสว่าง\nบ้านเราใช้ระบบขนาน',ex:{q:'R₁=3Ω R₂=6Ω ต่อขนาน R_total = ?',a:'1/R = 1/3 + 1/6 = 3/6 → R = 2 Ω'}},
    {t:'แม่เหล็กและสนามแม่เหล็ก',f:'เส้นแรงแม่เหล็กออกจากขั้วเหนือ → เข้าขั้วใต้\nขั้วเหมือนกัน → ผลักกัน\nขั้วต่างกัน → ดึงดูดกัน',d:'การเหนี่ยวนำแม่เหล็กไฟฟ้า (Faraday):\nเคลื่อนตัวนำผ่านสนามแม่เหล็ก → เกิดกระแสไฟฟ้า\nใช้หลักการนี้: ไดนาโม, เครื่องปั่นไฟ',ex:{q:'ขั้วเหนือสองแท่งวางชนกัน จะเกิดอะไร?',a:'ผลักกัน (ขั้วเหมือนกันผลัก ขั้วต่างกันดึงดูด)'}},
  ]},
  {icon:'🦠',title:'ร่างกายมนุษย์และสุขภาพ',items:[
    {t:'ระบบในร่างกายมนุษย์',f:'',d:'🫀 ระบบหมุนเวียนเลือด: หัวใจ+หลอดเลือด ลำเลียง O₂+สารอาหาร\n🫁 ระบบหายใจ: ปอด แลกเปลี่ยน O₂/CO₂\n🧠 ระบบประสาท: สมอง+ไขสันหลัง+เส้นประสาท ควบคุมร่างกาย\n🦷 ระบบย่อยอาหาร: ปาก→หลอดอาหาร→กระเพาะ→ลำไส้เล็ก→ลำไส้ใหญ่\n🦴 ระบบโครงกระดูกและกล้ามเนื้อ: รองรับและเคลื่อนไหว\n🚰 ระบบขับถ่าย: ไต กรองของเสียออกทางปัสสาวะ',ex:{q:'อวัยวะใดกรองของเสียออกจากเลือด?',a:'ไต (สร้างปัสสาวะ)'}},
    {t:'เลือดและหมู่เลือด',f:'เลือดประกอบด้วย:\nเม็ดเลือดแดง (ลำเลียง O₂) + เม็ดเลือดขาว (ต้านเชื้อโรค)\n+ เกล็ดเลือด (แข็งตัว) + พลาสมา (ของเหลว)',d:'หมู่เลือด ABO: A, B, AB, O\nหมู่ O = ให้เลือดได้ทุกหมู่ (Universal Donor)\nหมู่ AB = รับเลือดได้ทุกหมู่ (Universal Recipient)',ex:{q:'หมู่เลือดใดให้เลือดกับทุกคนได้?',a:'หมู่เลือด O (Universal Donor)'}},
    {t:'ฮอร์โมนสำคัญ',f:'',d:'ต่อมใต้สมอง → Growth Hormone (การเจริญเติบโต)\nต่อมไทรอยด์ → Thyroxine (เผาผลาญพลังงาน)\nตับอ่อน → Insulin (ลดน้ำตาลในเลือด) / Glucagon (เพิ่มน้ำตาล)\nต่อมหมวกไต → Adrenaline (สู้หรือหนี Fight or Flight)\nอัณฑะ → Testosterone | รังไข่ → Estrogen/Progesterone',ex:{q:'ฮอร์โมนใดควบคุมระดับน้ำตาลในเลือด?',a:'อินซูลิน (ลด) และกลูคากอน (เพิ่ม) ผลิตที่ตับอ่อน'}},
  ]},
],
math:[
  {icon:'📐',title:'เรขาคณิต – พื้นที่และปริมาตร',items:[
    {t:'รูปสี่เหลี่ยม',f:'สี่เหลี่ยมผืนผ้า: พื้นที่ = กว้าง × ยาว\nสี่เหลี่ยมจัตุรัส: พื้นที่ = ด้าน²\nสี่เหลี่ยมขนมเปียกปูน: พื้นที่ = ฐาน × สูง\nสี่เหลี่ยมคางหมู: พื้นที่ = ½(a+b)×h',d:'เส้นรอบรูปทุกรูป = บวกด้านทั้งหมด\nสี่เหลี่ยมผืนผ้า: เส้นรอบรูป = 2(กว้าง+ยาว)',ex:{q:'สี่เหลี่ยมคางหมูขนาน 4 กับ 8 สูง 5 พื้นที่ = ?',a:'½(4+8)×5 = ½×12×5 = 30 ตร.หน่วย'}},
    {t:'วงกลม',f:'พื้นที่ = πr²\nเส้นรอบวง (Circumference) = 2πr\nเส้นผ่านศูนย์กลาง d = 2r\nπ ≈ 3.14159 (ใช้ 22/7 ในการคำนวณ)',d:'รัศมี r = ระยะจากศูนย์กลางถึงเส้นรอบวง\nเส้นผ่านศูนย์กลาง = รัศมี × 2',ex:{q:'วงกลมรัศมี 7 ซม. เส้นรอบวง = ?',a:'2 × 22/7 × 7 = 44 ซม.'}},
    {t:'สามเหลี่ยม',f:'พื้นที่ = ½ × ฐาน × สูง\nสูตรเฮรอน: A = √[s(s-a)(s-b)(s-c)]\nโดย s = (a+b+c)/2',d:'ผลรวมมุมภายใน = 180°\nสามเหลี่ยมด้านเท่า: ทุกมุม = 60°\nสามเหลี่ยมมุมฉาก: มุมหนึ่ง = 90°',ex:{q:'สามเหลี่ยมฐาน 10 สูง 6 พื้นที่ = ?',a:'½ × 10 × 6 = 30 ตร.หน่วย'}},
    {t:'ปริมาตรทรงสามมิติ',f:'ทรงสี่เหลี่ยม: V = กว้าง × ยาว × สูง\nทรงกระบอก: V = πr²h\nทรงกรวย: V = ⅓πr²h\nทรงกลม: V = 4/3 πr³',d:'พื้นที่ผิว (Surface Area):\nทรงสี่เหลี่ยม SA = 2(lb+bh+lh)\nทรงกระบอก SA = 2πr² + 2πrh',ex:{q:'ทรงกระบอกรัศมี 3 สูง 7 ปริมาตร = ?',a:'π × 3² × 7 = 63π ≈ 197.9 ลบ.หน่วย'}},
    {t:'ทฤษฎีพีทาโกรัส',f:'a² + b² = c²\n(c = ด้านตรงข้ามมุมฉาก / hypotenuse)',d:'ใช้กับสามเหลี่ยมมุมฉากเท่านั้น!\nคู่ที่จำง่าย (Pythagorean Triple):\n(3,4,5) (5,12,13) (8,15,17) (7,24,25)\nคูณ n เท่าได้เลย: (6,8,10) (9,12,15)',ex:{q:'บันไดยาว 5m พิงกำแพงสูง 4m ฐานห่างกำแพง = ?',a:'√(5²-4²) = √(25-16) = √9 = 3 m'}},
  ]},
  {icon:'🔢',title:'พีชคณิต – สมการและอสมการ',items:[
    {t:'การแก้สมการ 1 ตัวแปร',f:'หลักการ: ทำสิ่งเดียวกันกับทั้งสองข้าง\nย้ายพจน์ = เปลี่ยนเครื่องหมายแล้วย้ายข้าง',d:'วิธีแก้:\n1. กระจายวงเล็บ\n2. รวมพจน์เหมือนกัน\n3. ย้ายตัวแปรไปข้างหนึ่ง ตัวเลขอีกข้างหนึ่ง\n4. หาร/คูณเพื่อให้ coefficient = 1',ex:{q:'3x + 7 = 22 แก้สมการหา x',a:'3x = 22-7 = 15 → x = 5'}},
    {t:'สมการกำลังสอง ax²+bx+c=0',f:'วิธีที่ 1: แยกตัวประกอบ\nวิธีที่ 2: สูตรกำลังสอง\nx = [-b ± √(b²-4ac)] / 2a',d:'Discriminant D = b²-4ac\nD > 0 → 2 คำตอบจริงต่างกัน\nD = 0 → 1 คำตอบซ้ำ (x = -b/2a)\nD < 0 → ไม่มีคำตอบจริง',ex:{q:'x²-7x+12 = 0 หา x',a:'(x-3)(x-4) = 0 → x = 3 หรือ x = 4'}},
    {t:'ระบบสมการสองตัวแปร',f:'วิธี Substitution: แทนค่าตัวแปรหนึ่ง\nวิธี Elimination: บวก/ลบสมการเพื่อตัดตัวแปร',d:'ตัวอย่างระบบ:\nx + y = 10 ... (1)\nx - y = 2  ... (2)\n(1)+(2): 2x = 12 → x = 6\nแทนใน (1): 6+y = 10 → y = 4',ex:{q:'2x+y=7 และ x-y=2 หา x,y',a:'บวกกัน: 3x=9 → x=3, y=1'}},
    {t:'อสมการเชิงเส้น',f:'เหมือนสมการ แต่เมื่อคูณ/หารด้วยจำนวนลบ → เปลี่ยนทิศทาง!',d:'x > 2 หมายถึง x มากกว่า 2 ไม่รวม 2\nx ≥ 2 หมายถึง x มากกว่าหรือเท่ากับ 2 รวม 2\nกราฟ: จุดปิด ● = รวม | จุดเปิด ○ = ไม่รวม',ex:{q:'-2x < 6 แก้อสมการ',a:'-2x < 6 → x > -3 (หารด้วยลบ เปลี่ยนทิศ!)'}},
    {t:'การแยกตัวประกอบ',f:'a²-b² = (a+b)(a-b)  ← ผลต่างกำลังสอง\n(a+b)² = a²+2ab+b²\n(a-b)² = a²-2ab+b²\n(a+b)³ = a³+3a²b+3ab²+b³',d:'เทคนิคการแยก:\n1. ดูตัวร่วม\n2. จัดกลุ่ม\n3. ลองเดา (trial and error) สำหรับ ax²+bx+c',ex:{q:'แยกตัวประกอบ x²-9',a:'x²-9 = (x+3)(x-3) ← ผลต่างกำลังสอง'}},
  ]},
  {icon:'📊',title:'สถิติ ความน่าจะเป็น และการนับ',items:[
    {t:'ค่ากลางของข้อมูล',f:'Mean (เฉลี่ย) = ∑x / n\nMedian (มัธยฐาน) = ค่ากลางเมื่อเรียงแล้ว\nMode (ฐานนิยม) = ค่าที่ซ้ำมากสุด\nRange (พิสัย) = ค่าสูงสุด - ค่าต่ำสุด',d:'ถ้าข้อมูล n คู่ Median = เฉลี่ยของ 2 ค่ากลาง\nตัวอย่าง: 2,3,5,7,9 → Median = 5',ex:{q:'หา Mean, Median, Mode ของ 3,5,5,7,10',a:'Mean = 30/5 = 6 | Median = 5 | Mode = 5'}},
    {t:'ความน่าจะเป็น (Probability)',f:'P(A) = จำนวนผลที่ต้องการ / ผลทั้งหมด\n0 ≤ P(A) ≤ 1\nP(A) + P(A\') = 1',d:'การเหตุการณ์อิสระ: P(A∩B) = P(A)×P(B)\nการเหตุการณ์ Mutually Exclusive: P(A∪B) = P(A)+P(B)\nP(A∪B) = P(A)+P(B)-P(A∩B) (ทั่วไป)',ex:{q:'ไพ่ 52 ใบ P(โพดำ) = ?',a:'13/52 = 1/4 = 0.25 = 25%'}},
    {t:'การเรียงสับเปลี่ยน (Permutation)',f:'nPr = n! / (n-r)!\nการจัดทุกตัว: n! = n×(n-1)×...×2×1',d:'ใช้เมื่อ: ลำดับสำคัญ (A,B ≠ B,A)\nตัวอย่าง: เรียง 3 คนจาก 5 คน\n= 5P3 = 5!/(5-3)! = 5×4×3 = 60 วิธี',ex:{q:'เรียงตัวอักษร A,B,C,D เลือก 2 ตัว = ?',a:'4P2 = 4!/(4-2)! = 4×3 = 12 วิธี'}},
    {t:'การเลือก (Combination)',f:'nCr = n! / [r!(n-r)!]\nอ่านว่า "n choose r"',d:'ใช้เมื่อ: ลำดับไม่สำคัญ (AB = BA)\nตัวอย่าง: เลือก 3 คนจาก 5 คน\n= 5C3 = 5!/(3!×2!) = 10 วิธี\nC(n,0) = C(n,n) = 1',ex:{q:'เลือกทีม 2 คนจาก 6 คน = ?',a:'6C2 = 6!/(2!×4!) = 15 วิธี'}},
  ]},
  {icon:'📏',title:'ตรีโกณมิติ',items:[
    {t:'อัตราส่วนตรีโกณมิติ',f:'sin θ = ตรงข้าม / ด้านตรงข้ามมุมฉาก (O/H)\ncos θ = ชิดมุม / ด้านตรงข้ามมุมฉาก (A/H)\ntan θ = ตรงข้าม / ชิดมุม (O/A)',d:'จำง่ายๆ: SOH – CAH – TOA\nsin=Opp/Hyp | cos=Adj/Hyp | tan=Opp/Adj\ntan θ = sin θ / cos θ',ex:{q:'สามเหลี่ยมมุมฉาก ด้านตรงข้าม 3 ด้านยาว 5 sin A = ?',a:'sin A = 3/5 = 0.6'}},
    {t:'ตารางค่าตรีโกณมิติ',f:'',d:'มุม  | sin      | cos     | tan\n0°   | 0        | 1       | 0\n30°  | 1/2      | √3/2    | 1/√3\n45°  | √2/2     | √2/2    | 1\n60°  | √3/2     | 1/2     | √3\n90°  | 1        | 0       | ∞',ex:{q:'sin 60° + cos 30° = ?',a:'√3/2 + √3/2 = √3 ≈ 1.732'}},
    {t:'เอกลักษณ์ตรีโกณมิติ',f:'sin²θ + cos²θ = 1  ← สำคัญมาก!\n1 + tan²θ = sec²θ\n1 + cot²θ = csc²θ',d:'มุมเสริม: sin(90°-θ) = cos θ\nมุมประ: sin(180°-θ) = sin θ\ncos(180°-θ) = -cos θ',ex:{q:'ถ้า sin θ = 0.6 แล้ว cos θ = ?',a:'cos θ = √(1-0.36) = √0.64 = 0.8'}},
    {t:'กฎของ sine และ cosine',f:'กฎ sine: a/sin A = b/sin B = c/sin C\nกฎ cosine: a² = b²+c²-2bc·cos A',d:'ใช้กฎ sine: รู้มุม-ด้านตรงข้ามอย่างละ 1\nใช้กฎ cosine: รู้ด้าน 3 ด้าน หรือ ด้าน 2 + มุมที่ประกอบด้วยกัน',ex:{q:'สามเหลี่ยม a=7, b=5, C=60° หา c',a:'c² = 49+25-2(7)(5)cos60° = 74-35 = 39 → c = √39'}},
  ]},
  {icon:'∞',title:'แคลคูลัสเบื้องต้น',items:[
    {t:'ลิมิต (Limit)',f:'lim(x→a) f(x) = L\nวิธีหา: แทนค่า / แยกตัวประกอบ / กฎ L\'Hôpital',d:'lim(x→0) (sin x)/x = 1\nlim(x→∞) (1+1/n)ⁿ = e ≈ 2.718\nถ้าได้รูป 0/0 หรือ ∞/∞ → ใช้ L\'Hôpital',ex:{q:'lim(x→2) (x²-4)/(x-2) = ?',a:'= lim (x+2)(x-2)/(x-2) = lim(x+2) = 4'}},
    {t:'อนุพันธ์ (Derivative)',f:'f\'(x) = lim[f(x+h)-f(x)]/h\nd/dx (xⁿ) = nxⁿ⁻¹\nd/dx (sin x) = cos x\nd/dx (cos x) = -sin x\nd/dx (eˣ) = eˣ\nd/dx (ln x) = 1/x',d:'กฎลูกโซ่: d/dx[f(g(x))] = f\'(g(x))·g\'(x)\nกฎคูณ: d/dx[f·g] = f\'g + fg\'\nกฎหาร: d/dx[f/g] = (f\'g - fg\')/g²',ex:{q:'f(x) = 3x⁴ - 2x² + 5 หา f\'(x)',a:'f\'(x) = 12x³ - 4x'}},
    {t:'อินทิกรัล (Integral)',f:'∫xⁿ dx = xⁿ⁺¹/(n+1) + C\n∫eˣ dx = eˣ + C\n∫(1/x) dx = ln|x| + C\n∫sin x dx = -cos x + C\n∫cos x dx = sin x + C',d:'Fundamental Theorem: ∫ₐᵇ f(x)dx = F(b) - F(a)\nพื้นที่ใต้กราฟ = ∫ₐᵇ f(x) dx',ex:{q:'∫(3x²+2x) dx = ?',a:'x³ + x² + C'}},
  ]},
  {icon:'🔣',title:'เลขยกกำลัง ลอการิทึม และจำนวนเชิงซ้อน',items:[
    {t:'กฎเลขยกกำลัง',f:'aᵐ × aⁿ = aᵐ⁺ⁿ\naᵐ ÷ aⁿ = aᵐ⁻ⁿ\n(aᵐ)ⁿ = aᵐⁿ\na⁰ = 1 (a≠0)\na⁻ⁿ = 1/aⁿ\na^(m/n) = ⁿ√(aᵐ)',d:'จำง่าย: คูณกัน → บวกเลขชี้กำลัง\nหารกัน → ลบเลขชี้กำลัง',ex:{q:'2³ × 2⁴ = ?',a:'2³⁺⁴ = 2⁷ = 128'}},
    {t:'ลอการิทึม (Logarithm)',f:'log_a(b) = c ↔ aᶜ = b\nln x = log_e x (e ≈ 2.718)\nlog(AB) = logA + logB\nlog(A/B) = logA - logB\nlog(Aⁿ) = n·logA',d:'log₁₀ 10 = 1 | log₁₀ 100 = 2\nln e = 1 | log 1 = 0 (ทุกฐาน)\nlogₐ a = 1 | logₐ 1 = 0',ex:{q:'log₂ 32 = ?',a:'2⁵ = 32 ดังนั้น log₂ 32 = 5'}},
    {t:'จำนวนเชิงซ้อน',f:'i = √(-1)\ni² = -1, i³ = -i, i⁴ = 1\nจำนวนเชิงซ้อน z = a + bi\n|z| = √(a²+b²)',d:'การบวก: (a+bi)+(c+di) = (a+c)+(b+d)i\nการคูณ: (a+bi)(c+di) = (ac-bd)+(ad+bc)i\nComplex Conjugate ของ a+bi คือ a-bi',ex:{q:'(2+3i)(1-i) = ?',a:'= 2-2i+3i-3i² = 2+i+3 = 5+i'}},
  ]},
],
english:[
  {icon:'🔤',title:'Verb to be: is / am / are / was / were',items:[
    {t:'ปัจจุบัน: is / am / are',f:'',d:'',table:{heads:['Subject','Verb to be','ตัวอย่าง'],rows:[['I','am','I am a student. / I am happy.'],['He / She / It','is','She is tall. / It is hot.'],['ชื่อคนเดียว','is','Tom is my friend.'],['You','are','You are smart.'],['We / They','are','They are brothers.'],['พหูพจน์ทั่วไป','are','The dogs are big.']]}},
    {t:'อดีต: was / were',f:'',d:'',table:{heads:['Subject','อดีต','ตัวอย่าง'],rows:[['I / He / She / It','was','I was sick yesterday.'],['You / We / They','were','They were happy.']]}},

function guideHTML(){
  const s=st.subj||'math';
  const tabCls={science:'active-sci',math:'active-math',english:'active-eng'};
  const topics=GUIDE[s];
  const color={science:'sci',math:'math',english:'eng'}[s];
  const topicCards=topics.map((t,ti)=>{
    const bodyId=`tb-${ti}`;
    const items=t.items.map((item,ii)=>{
      let content='';
      if(item.table){
        content+=`<div style="overflow-x:auto"><table class="eng-table"><thead><tr>${item.table.heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${item.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
      }
      if(item.f){content+=`<div style="font-size:16px;font-weight:900;color:#1E293B;background:white;border-radius:10px;padding:10px 13px;border:1.5px solid #E2E8F0;margin:8px 0;font-family:monospace;line-height:1.7;white-space:pre-wrap">${item.f}</div>`;}
      if(item.d){content+=`<div style="font-size:13px;color:#475569;line-height:1.7;white-space:pre-wrap;margin-bottom:6px">${item.d}</div>`;}
      if(item.ex){content+=`<div class="formula-ex"><div class="ex-label">ตัวอย่าง</div><div class="ex-q">❓ ${item.ex.q}</div><div class="ex-a ${color}">✅ ${item.ex.a}</div></div>`;}
      return `<div class="formula-box ${color}" style="margin-bottom:12px"><div class="formula-title">${item.t}</div>${content}</div>`;
    }).join('');
    return `<div class="topic-card">
      <div class="topic-head" onclick="toggleTopic('${bodyId}')">
        <div class="topic-icon" style="background:${color==='sci'?'#DCFCE7':color==='math'?'#EDE9FE':'#DBEAFE'}">${t.icon}</div>
        <div class="topic-title">${t.title}</div>
        <div class="topic-chevron" id="${bodyId}-chev">▼</div>
      </div>
      <div class="topic-body" id="${bodyId}">${items}</div>
    </div>`;
  }).join('');

  return`
  <button class="back" onclick="st.screen='home';render()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
    กลับหน้าหลัก
  </button>
  <div style="margin-bottom:6px">
    <div style="font-size:22px;font-weight:900;color:#1E293B;margin-bottom:4px">📖 สูตร &amp; วิธีคิด</div>
    <div style="font-size:13px;color:#64748B">อ่านก่อนสอบ เข้าใจแล้วทำได้แน่นอน!</div>
  </div>
  <div class="guide-subj-tabs">
    <button class="gtab${s==='science'?' active-sci':''}" onclick="st.subj='science';render()">🔬 วิทย์</button>
    <button class="gtab${s==='math'?' active-math':''}" onclick="st.subj='math';render()">📐 คณิต</button>
    <button class="gtab${s==='english'?' active-eng':''}" onclick="st.subj='english';render()">🔤 อังกฤษ</button>
  </div>
  ${topicCards}
  <div style="margin-top:16px">
    <button class="btn-p ${s==='science'?'sci-nxt':s==='math'?'math-nxt':'eng-nxt'}" onclick="pick('${s}')" style="width:100%">สอบ${s==='science'?'วิทยาศาสตร์':s==='math'?'คณิตศาสตร์':'ภาษาอังกฤษ'}เลย →</button>
  </div>`;
}

/* ── MODAL ── */
function showConfirm(){
  if(document.getElementById('confirm-modal'))return;
  const d=document.createElement('div');
  d.className='modal-overlay';d.id='confirm-modal';
  d.innerHTML=`
    <div class="modal-box">
      <div class="modal-icon">🏠</div>
      <div class="modal-title">กลับหน้าแรก?</div>
      <div class="modal-msg">คะแนนและข้อสอบที่ทำไปแล้ว<br>จะหายไปนะ ยืนยันไหม?</div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeConfirm()">เล่นต่อ</button>
        <button class="modal-confirm" onclick="goHome()">กลับหน้าแรก</button>
      </div>
    </div>`;
  document.body.appendChild(d);
  d.addEventListener('click',function(e){if(e.target===d)closeConfirm();});
}
function closeConfirm(){const d=document.getElementById('confirm-modal');if(d)d.remove();}
function goHome(){
  closeConfirm();
  st.screen='home';st.subj=null;st.grade=null;st.qs=[];st.qi=0;st.score=0;st.ans=false;st.saveStatus='idle';st.attemptId=null;
  render();
}

/* ── ACTIONS ── */
function pick(s){st.subj=s;st.screen='grade';render()}
function start(g){
  const raw=(document.getElementById('nicknameInput')?.value??st.nickname??'').trim();
  st.nickname=raw;
  const warn=document.getElementById('nickWarn');
  if(!raw){
    if(warn)warn.classList.add('show');
    const inp=document.getElementById('nicknameInput');
    if(inp){inp.focus();inp.scrollIntoView({behavior:'smooth',block:'center'});}
    return;
  }
  if(warn)warn.classList.remove('show');
  st.grade=g;
  st.qs=prepQ(st.subj,g,Math.min(st.setSize,QB[st.subj][g].length));
  st.qi=0;st.score=0;st.ans=false;st.saveStatus='idle';st.attemptId=newAttemptId();
  st.screen='quiz';render();
}
function answer(i){
  if(st.ans)return;st.ans=true;
  const q=st.qs[st.qi],cor=q.a,ok=i===cor;
  if(ok)st.score++;
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.classList.add('done');
    if(idx===cor)b.classList.add('correct');
    else if(idx===i&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  const praise=['เยี่ยมมาก! ถูกต้อง! 🎉','สุดยอด! ตอบถูกเลย! ⭐','ใช่เลย! เก่งมาก! 🌟','ถูกต้อง! ฉลาดมากเลย! 🏆'];
  fb.textContent=ok?praise[Math.floor(Math.random()*praise.length)]:`ยังไม่ถูกนะ 😅 คำตอบที่ถูกต้องคือ "${q.o[cor]}"`;
  fb.className='fb show '+(ok?'ok':'no');
  document.getElementById('nxt').classList.add('show');
}
function nxt(){
  st.qi++;st.ans=false;
  if(st.qi>=st.qs.length){
    st.screen='result';
    render();
    sendScoreToSheet().finally(()=>{if(st.screen==='result')render();});
    return;
  }
  render();
}
